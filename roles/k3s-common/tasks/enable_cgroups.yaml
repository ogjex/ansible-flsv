- name: Gather current kernel command line
  command: cat /boot/firmware/cmdline.txt
  register: cmdline_result
  changed_when: false
  become: yes

- name: Set cmdline fact
  set_fact:
    cmdline: "{{ cmdline_result.stdout | trim }}"

- name: Append all missing cgroups settings at once
  lineinfile:
    path: /boot/firmware/cmdline.txt
    line: >-
      {{ cmdline }}
      {% if 'cgroup_enable=cpuset' not in cmdline %} cgroup_enable=cpuset{% endif %}
      {% if 'cgroup_memory=1' not in cmdline %} cgroup_memory=1{% endif %}
      {% if 'cgroup_enable=memory' not in cmdline %} cgroup_enable=memory{% endif %}
    regexp: '^(.*[^ ])$'
    backrefs: yes
  when: ansible_architecture == "aarch64" or ansible_architecture == "armv7l"
  become: yes
  notify: Reboot node
