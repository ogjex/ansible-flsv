- name: Append cgroups settings if missing
  lineinfile:
    path: /boot/firmware/cmdline.txt
    line: "{{ item.line }}"
    regexp: "{{ item.regexp }}"
    backrefs: yes
    state: present
  loop:
    - { line: '\1 cgroup_enable=cpuset', regexp: '^(.*[^ ])$', check: "cgroup_enable=cpuset" }
    - { line: '\1 cgroup_memory=1', regexp: '^(.*[^ ])$', check: "cgroup_memory=1" }
    - { line: '\1 cgroup_enable=memory', regexp: '^(.*[^ ])$', check: "cgroup_enable=memory" }
  when:
    - ansible_architecture == "aarch64" or ansible_architecture == "armv7l"
    - not ansible_facts['cmdline']['stdout'] is search(item.check)
  notify: Reboot node
